<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RoadFolio - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#f9bd22",
                        "on-tertiary-container": "#4a3500",
                        "surface-container-high": "#212c27",
                        "inverse-surface": "#d8e6dd",
                        "outline": "#86948a",
                        "tertiary-fixed": "#ffdf9f",
                        "primary-fixed": "#6ffbbe",
                        "surface": "#0a1611",
                        "error-container": "#93000a",
                        "surface-variant": "#2c3731",
                        "surface-bright": "#303c36",
                        "primary-container": "#10b981",
                        "on-primary": "#003824",
                        "surface-container-highest": "#2c3731",
                        "on-secondary-fixed": "#002114",
                        "outline-variant": "#3c4a42",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "on-primary-fixed-variant": "#005236",
                        "secondary-fixed": "#68fcbf",
                        "on-surface-variant": "#bbcabf",
                        "secondary-container": "#00bd85",
                        "inverse-primary": "#006c49",
                        "secondary": "#45dfa4",
                        "primary": "#4edea3",
                        "inverse-on-surface": "#27332d",
                        "surface-container-lowest": "#06100c",
                        "surface-container": "#17221d",
                        "on-surface": "#d8e6dd",
                        "on-background": "#d8e6dd",
                        "tertiary": "#f9bd22",
                        "on-primary-container": "#00422b",
                        "surface-container-low": "#131e19",
                        "secondary-fixed-dim": "#45dfa4",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#005137",
                        "on-secondary-container": "#00452e",
                        "on-error": "#690005",
                        "background": "#0a1611",
                        "primary-fixed-dim": "#4edea3",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#0a1611",
                        "on-tertiary-fixed": "#261a00",
                        "on-secondary": "#003825",
                        "on-primary-fixed": "#002113",
                        "on-tertiary": "#402d00",
                        "tertiary-container": "#ce9a00",
                        "surface-tint": "#4edea3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1440px",
                        "panel-padding": "24px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Space Grotesk"],
                        "label-sm": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "display-lg": ["Space Grotesk"],
                        "body-base": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                    }
                }
            }
        }

<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a1611;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            color: #d8e6dd;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-panel {
            background: rgba(19, 30, 25, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.1);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            outline: none;
            border-bottom-color: #10b981;
            box-shadow: 0 4px 12px -2px rgba(16, 185, 129, 0.2);
        }

        .btn-primary {
            background-color: #10b981;
            color: #003824;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
            transform: translateY(-1px);
        }

        .btn-ghost-glass {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #4edea3;
            transition: all 0.3s ease;
        }

        .btn-ghost-glass:hover {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="p-4 md:p-8">
<div class="w-full max-w-md">
<!-- Brand Logo -->
<div class="text-center mb-10">
<h1 class="font-display-lg text-display-lg md:font-display-lg md:text-display-lg text-primary tracking-tight">RoadFolio</h1>
</div>
<!-- Auth Card -->
<div class="glass-panel rounded-[18px] p-panel-padding md:p-10 w-full relative overflow-hidden">
<!-- Subtle internal glow -->
<div class="absolute -top-20 -right-20 w-40 h-40 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="relative z-10">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Sign in to RoadFolio</h2>
<p class="font-body-base text-body-base text-on-surface-variant mb-8">Welcome back! Please enter your details.</p>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none pb-2">mail</span>
<input class="glass-input w-full font-body-base text-body-base text-on-surface pl-8 pr-4 py-3 placeholder:text-on-surface-variant/50 focus:ring-0" id="email" placeholder="Enter your email" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none pb-2">lock</span>
<input class="glass-input w-full font-body-base text-body-base text-on-surface pl-8 pr-4 py-3 placeholder:text-on-surface-variant/50 focus:ring-0" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<button class="btn-primary w-full py-3 px-6 rounded-xl font-body-base text-body-base font-semibold flex items-center justify-center gap-2 mt-8" type="button">
                        Sign in
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative bg-[#131e19] px-4 font-label-sm text-label-sm text-on-surface-variant tracking-wider">
                        OR
                    </div>
</div>
<!-- Google Auth Button -->
<button class="btn-ghost-glass w-full py-3 px-6 rounded-xl font-body-base text-body-base flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
<p class="mt-8 text-center font-body-base text-body-base text-on-surface-variant">
                    Don't have an account? <a class="text-primary hover:text-primary-fixed transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
</div>
</body></html>
